# Dataset paths and download configuration
# Note: this group is merged under `data`; use ${data.data_root} in interpolations
# (${data_root} would look for a root-level key and fail).
data_root: ${oc.env:DATA_ROOT,data}

# Style reference images for B-LoRA fine-tuning (curated manually, ~10-20 images per style)
styles:
  dir: ${data.data_root}/styles

# Content images for evaluation (small COCO subset)
coco_val2017:
  url: http://images.cocodataset.org/zips/val2017.zip
  annotations_url: http://images.cocodataset.org/annotations/annotations_trainval2017.zip
  dir: ${data.data_root}/coco_val2017
  max_eval_samples: 100  # only first N images used for evaluation

# ArtBench-10: 10 art styles, balanced — used for quantitative FID evaluation
artbench10:
  hf_id: Doub7e/ArtBench-10
  dir: ${data.data_root}/artbench10
  split: train
  image_column: image
