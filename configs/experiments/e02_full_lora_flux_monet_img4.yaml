---
# E02 — Full-LoRA-FLUX, Monet style image 4
# Baseline: LoRA on ALL FLUX blocks (no block selection)
job: extension
config:
  name: "e02_full_lora_flux_monet_img4"
  process:
    - type: 'sd_trainer'
      training_folder: "output"
      device: cuda:0
      network:
        type: "lora"
        linear: 16
        linear_alpha: 16
        # no only_if_contains → all blocks are trained
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
        push_to_hub: false
      datasets:
        - folder_path: "data/styles/monet/img4"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 768, 1024]
      train:
        batch_size: 1
        steps: 2000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 5e-5
        ema_config:
          use_ema: true
          ema_decay: 0.99
        dtype: bf16
      model:
        name_or_path: "/models/flux-dev"
        is_flux: true
        quantize: true
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "a cat sitting on a chair"
          - "a landscape with mountains and a river"
          - "a person reading a book in a park"
        neg: ""
        seed: 42
        walk_seed: false
        guidance_scale: 3.5
        sample_steps: 28

meta:
  name: "[name]"
  version: '1.0'
