---
# B02 — Ablation B: rank r=8, blocks [30–37], 500 steps, Van Gogh img1
job: extension
config:
  name: "b02_rank_8"
  process:
    - type: 'sd_trainer'
      training_folder: "output"
      device: cuda:0
      network:
        type: "lora"
        linear: 8
        linear_alpha: 8
        network_kwargs:
          only_if_contains:
            - "single_transformer_blocks.30"
            - "single_transformer_blocks.31"
            - "single_transformer_blocks.32"
            - "single_transformer_blocks.33"
            - "single_transformer_blocks.34"
            - "single_transformer_blocks.35"
            - "single_transformer_blocks.36"
            - "single_transformer_blocks.37"
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 2
        push_to_hub: false
      datasets:
        - folder_path: "data/styles/van_gogh/img1"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 768, 1024]
      train:
        batch_size: 1
        steps: 500
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1e-4
        ema_config:
          use_ema: true
          ema_decay: 0.99
        dtype: bf16
      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: true
      sample:
        sampler: "flowmatch"
        sample_every: 500
        width: 1024
        height: 1024
        prompts:
          - "a cat sitting on a chair"
          - "a landscape with mountains and a river"
        neg: ""
        seed: 42
        walk_seed: false
        guidance_scale: 3.5
        sample_steps: 28

meta:
  name: "[name]"
  version: '1.0'
