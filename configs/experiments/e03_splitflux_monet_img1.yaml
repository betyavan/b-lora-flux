---
# E03M-1 — Phase 4.3: SplitFlux baseline, monet style image 1
# SplitFlux: style LoRA trained on double-stream blocks [0–18] (competing approach to B-LoRA's single-stream).
# Represents the hypothesis that double-stream blocks, not single-stream, carry style signal.
job: extension
config:
  name: "e03_splitflux_monet_img1"
  process:
    - type: 'sd_trainer'
      training_folder: "output"
      device: cuda:0
      network:
        type: "lora"
        linear: 16
        linear_alpha: 16
        network_kwargs:
          only_if_contains:
            - "transformer_blocks.0"
            - "transformer_blocks.1"
            - "transformer_blocks.2"
            - "transformer_blocks.3"
            - "transformer_blocks.4"
            - "transformer_blocks.5"
            - "transformer_blocks.6"
            - "transformer_blocks.7"
            - "transformer_blocks.8"
            - "transformer_blocks.9"
            - "transformer_blocks.10"
            - "transformer_blocks.11"
            - "transformer_blocks.12"
            - "transformer_blocks.13"
            - "transformer_blocks.14"
            - "transformer_blocks.15"
            - "transformer_blocks.16"
            - "transformer_blocks.17"
            - "transformer_blocks.18"
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
        push_to_hub: false
      datasets:
        - folder_path: "data/styles/monet/img1"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 768, 1024]
      train:
        batch_size: 1
        steps: 1000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 5e-5
        ema_config:
          use_ema: false
        dtype: bf16
      model:
        name_or_path: "/models/flux-dev"
        is_flux: true
        quantize: true
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "a cat sitting on a chair"
          - "a landscape with mountains and a river"
          - "a person reading a book in a park"
        neg: ""
        seed: 42
        walk_seed: false
        guidance_scale: 3.5
        sample_steps: 28

meta:
  name: "[name]"
  version: '1.0'
